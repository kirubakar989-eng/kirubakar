<!DOCTYPE html>
<html>
<head>
    <title>College Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .login-box {
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        img {
            width: 120px;
            margin-bottom: 15px;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <!-- Replace with your college logo -->
    <img src="images.jpg" alt="College Logo">

    <h2>Student Login</h2>

    <form>
        <input type="text" placeholder="Username" required><br>
        <input type="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
